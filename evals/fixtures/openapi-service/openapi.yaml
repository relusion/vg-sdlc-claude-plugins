openapi: 3.1.0
info:
  title: Accounts API
  version: 1.0.0
paths:
  /accounts/{accountId}:
    get:
      operationId: getAccount
      parameters:
        - name: accountId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Account response
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Account"
components:
  schemas:
    Account:
      type: object
      required: [id, email, status]
      properties:
        id:
          type: string
        email:
          type: string
        status:
          type: string
          enum: [active, disabled]
