name: eval-live

# Live behavior evals: real Claude Code runs over the eval fixture copies with
# a hard per-scenario budget cap. Triggers are manual dispatch + a weekly
# schedule ONLY, so the API-key secret is never exposed to code arriving from
# external contributions. Without the ANTHROPIC_API_KEY Actions secret the job
# skips with an explicit notice — never a green run that implies live evidence
# was produced. Run records persist as CI artifacts; nothing is committed back
# to the repository by CI (curated summaries are copied into evals/results/ by
# a human when refreshing docs/BENCHMARKS.md).

on:
  workflow_dispatch:
    inputs:
      profile:
        description: "eval profile to run live"
        type: choice
        options: [smoke, benchmark, full]
        default: smoke
      budget-usd:
        description: >-
          hard per-scenario budget cap passed to eval_run.py; must meet the
          selected profile's highest recommended scenario budget
        default: "2.00"
  schedule:
    - cron: "17 6 * * 1" # weekly smoke run, Monday 06:17 UTC

permissions:
  contents: read

concurrency:
  group: eval-live
  cancel-in-progress: false

env:
  # Pinned for reproducible runs; must equal plugin-validate.yml's pin —
  # parity is CI-enforced by supply_chain_check.py.
  CLAUDE_VERSION: 2.1.195
  EVAL_RUN_DIR: /tmp/eval-live-${{ github.run_id }}-${{ github.run_attempt }}

jobs:
  live-evals:
    runs-on: ubuntu-latest
    # The full profile's sequential scenario deadlines total 180 minutes.
    # Leave setup/artifact headroom so the runner can write timeout receipts.
    timeout-minutes: 210
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Gate on the API-key secret
        id: gate
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          if [ -z "$ANTHROPIC_API_KEY" ]; then
            echo "have-key=false" >> "$GITHUB_OUTPUT"
            echo "::notice::ANTHROPIC_API_KEY secret is not configured — live evals SKIPPED (no model call was made, no live evidence exists from this run)."
          else
            echo "have-key=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Cache Claude Code CLI
        if: steps.gate.outputs.have-key == 'true'
        id: cli-cache
        uses: actions/cache@5a3ec84eff668545956fd18022155c47e93e2684 # v4.2.3
        with:
          # ~/.local/bin/claude is a symlink into the versioned dir below —
          # both must be cached or the restored symlink dangles (exit 127).
          path: |
            ~/.local/bin/claude
            ~/.local/share/claude
          key: claude-cli-${{ runner.os }}-${{ env.CLAUDE_VERSION }}-v2

      - name: Install Claude Code CLI
        if: steps.gate.outputs.have-key == 'true' && steps.cli-cache.outputs.cache-hit != 'true'
        run: curl -fsSL https://claude.ai/install.sh | bash -s "$CLAUDE_VERSION"

      - name: Run live evals (hard budget cap)
        if: steps.gate.outputs.have-key == 'true'
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          # Schedule runs have no inputs context — fall back to the weekly
          # smoke defaults.
          PROFILE: ${{ inputs.profile || 'smoke' }}
          BUDGET_USD: ${{ inputs.budget-usd || '2.00' }}
        run: |
          set -euo pipefail
          export PATH="$HOME/.local/bin:$PATH"
          claude --version
          python3 scripts/eval_run.py --execute --bare \
            --profile "$PROFILE" \
            --max-budget-usd "$BUDGET_USD" \
            --out-dir "$EVAL_RUN_DIR"

      - name: Show runner-generated summary
        if: always() && steps.gate.outputs.have-key == 'true'
        run: |
          if [ ! -f "$EVAL_RUN_DIR/summary.json" ]; then
            echo "::notice::No summary.json — the runner failed before it could write a receipt."
            exit 0
          fi
          python3 -m json.tool "$EVAL_RUN_DIR/summary.json"

      - name: Upload run records
        if: always() && steps.gate.outputs.have-key == 'true'
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: eval-live-${{ github.run_id }}-${{ github.run_attempt }}
          path: ${{ env.EVAL_RUN_DIR }}
          retention-days: 90
